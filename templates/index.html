<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AutoSuggest & Autocorrect System</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
        }

        .container-box {
            margin-top: 80px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
        }

        h1 {
            font-weight: bold;
        }

        .no-data {
            color: gray;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="container-box">

        <!-- TITLE -->
        <h1 class="text-center mb-4">🔍 AutoSuggest & Autocorrect System</h1>

        <!-- FORM -->
        <form method="POST" action="/suggest" class="mt-4">

            <div class="form-group">
                <label for="keyword">Enter a word:</label>
                <input 
                    type="text" 
                    class="form-control" 
                    id="keyword" 
                    name="keyword" 
                    placeholder="Type word here..." 
                    value="{{ keyword }}"
                    required>
            </div>

            <button type="submit" class="btn btn-primary btn-lg btn-block">
                Get Suggestions
            </button>

        </form>

        <!-- RESULTS -->
        <div id="suggestions" class="mt-4">

            {% if suggestion %}

            <table class="table table-hover table-bordered mt-4">
                <thead class="thead-dark">
                    <tr>
                        <th>Suggested Word</th>
                        <th>Similarity</th>
                    </tr>
                </thead>

                <tbody>
                    {% for item in suggestion %}
                    <tr>
                        <td>{{ item['Words'] }}</td>
                        <td>{{ item['Similarity'] }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>

            {% else %}
                <p class="no-data">No data available</p>
            {% endif %}

        </div>

    </div>
</div>

</body>
</html>
